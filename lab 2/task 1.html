<!DOCTYPE html>
<HTML>
  <HEADer>
    <style>
      .container
{
    margin-left: 30%;
    margin-right: 30%;

}
.form{
    
    background-color:  lightblue;
    padding: 20px;
    border: black solid 2px;
    border-radius: 10px;
    
}
.elements{
    border-radius: 10px;
    margin-left: 6px;
    margin-right: 6px;
    padding: 5px;
    margin-bottom: 5px;
    border: black solid 2px; 
    background-color:lightpink;
    align-items: center;
    align-self: center;
    align-content: center;
    text-align: center;
    word-spacing: 100px;
    position: relative;
    
    
    
}
label{
    /* width: 100%; */
    position:absolute;
    left: 20px;
    top: 10px;

}
input{
    width: 50%;
    padding: 5px;
    border-radius: 5px;
    margin-left:10px ;

}
textarea{
    width: 50%;
    border-radius: 10px;
    margin-left:10px ;

}
.flex-container{
    display: inline-block !important;
    /* height: 100px; */
    width: 150px !important;
    padding: 2px;
    margin-bottom: 10px;

}
.flex-container>input{
    width: 20px;

}
.but{
text-align: right;
margin-top: 20px;
margin-bottom: 20px;
width: 100%;
margin-right: 40px;

}
button{
    font-size: 30px;
    background-color: lightpink;
    font-weight: bold;
    border-radius: 10px;


}
    </style>
  </HEADer>
  <body>
    <div class="container">
      <h2>Payment Form</h2>
      <div class="form">
        <h3>Step 1: Your Details </h3>
              <div class="elements">
                <label for="name">Name</label> 
                <input type="text" name="name" placeholder="Full Name">
              </div>
    
              <div class="elements">
                <label for="email">Email</label> 
                <input type="text" name="email" placeholder="email">
              </div>
      
              <div class="elements">
                <label for="phone">phone</label> 
                <input type="text" name="phone" placeholder="phone">
              </div>
        <h3>Step 2: Delivery Address </h3>
              <div class="elements">
                <label for="Address">Address</label>   
                <textarea name="" id="" cols="20" rows="5">Adress</textarea> 
              </div>
              <div class="elements">
                <label for="phone">Post-Code</label> 
                <input type="text" name="phone" placeholder="postcode">
              </div>
              <div class="elements">
                <label for="phone">Country</label> 
                <input type="text" name="phone" placeholder="Country">
              </div>
          
        <h3>Step 3: Card Details </h3>
              
               <div class="flex-container"><input type="radio"><img src="visa.png" alt="" width="15px"> <span>Visa</span></div>
               <div class="flex-container"><input type="radio"><img src="debit.png" alt="" width="15px"> <span>debit</span></div>
               <div class="flex-container"><input type="radio"><img src="mastercard.jpg" alt="" width="15px"> <span>mastercard</span></div>

               
        
             
              
              <div class="elements">
                <label for="phone">Card-Number</label> 
                <input type="text" name="phone" placeholder="Card Number">
              </div>
              <div class="elements">
                <label for="phone">Security-Code</label> 
                <input type="text" name="phone" placeholder="Card Number">
              </div>
              <div class="elements">
                <label for="phone">Name-on-card</label> 
                <input type="text" name="phone" placeholder="Card Number">
              </div>

             <div class="but"> <button >BUY IT</button></div>
      </div>
    </div>
  </body>
</HTML>
