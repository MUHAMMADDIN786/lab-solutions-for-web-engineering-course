<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
            crossorigin="anonymous"
    />
    <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"
    ></script>
    <title>Grid Design Test</title>
</head>
<body>
<div style="padding: 10px">
    <div style="height: 80px" class="card bg-success"></div>
    <div class="row" style="margin-top: 30px; margin-left: 4px">
        <div style="background-color: yellow" class="card col-md-6" style="width: 18rem; height: 40rem">
            <div class="card-body"></div>
        </div>
        <div style="background-color: cyan; margin-left: 100px" class="card col-md-5"
             style="width: 18rem; height: 40rem">
            <div class="card-body" style="height: 100px"></div>
        </div>
    </div>

    <div class="row" style="margin-top: 30px; margin-left: 4px">
        <div style="background-color: purple" class="card col-md-6">
            <div class="card-body" style="height: 300px"></div>
        </div>
        <div style="margin-left: 100px;height: 100px; background-color: rgb(126, 122, 122)" class="card col-md-5"/>
        <div class="row">
            <div style="margin-left: 0px;height: 100px; margin-top: 20%; background-color: rgb(29,81,226)"
                 class="card col-md-4"/>
            <div style="margin-left: -10px;height: 100px; margin-top: 70%; background-color: grey; width: 180px;"
                 class="card col-md-12">
            </div>
            <div style="margin-left: 300px;height: 100px; margin-top:-200px; background-color: #fcc61e; width: 180px;"
                 class="card col-md-12">
            </div>
            <div style="margin-left: 300px;height: 100px; margin-top:10px; background-color: brown; width: 180px;"
                 class="card col-md-12">
            </div>
        </div>
    </div>
</div>
</body>
</html>
